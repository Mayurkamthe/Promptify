<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Account — Promptify</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080B12;--surface:#0E1420;--surface2:#131927;--border:rgba(255,255,255,0.07);--text:#F0F2F8;--muted:#6B7693;--accent:#6C63FF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
h1{font-family:'Syne',sans-serif;}
.blob{position:fixed;pointer-events:none;border-radius:50%;}
.blob1{top:-15%;right:20%;width:600px;height:600px;background:radial-gradient(ellipse,rgba(108,99,255,.13),transparent 68%);}
.blob2{bottom:-20%;left:20%;width:450px;height:450px;background:radial-gradient(ellipse,rgba(255,107,107,.07),transparent 68%);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;}
.logo{display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--text);text-decoration:none;margin-bottom:32px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#6C63FF,#9B6BFF);border-radius:9px;display:flex;align-items:center;justify-content:center;}
h1{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;text-align:center;}
.sub{font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:28px;font-weight:300;}
label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;margin-bottom:16px;}
input:focus{border-color:rgba(108,99,255,.5);}
input::placeholder{color:var(--muted);}
.btn-submit{width:100%;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-submit:hover{background:#7B74FF;box-shadow:0 8px 26px rgba(108,99,255,.42);}
.login-link{text-align:center;font-size:.87rem;color:var(--muted);margin-top:20px;}
.login-link a{color:var(--accent);text-decoration:none;font-weight:600;}
.login-link a:hover{text-decoration:underline;}
.terms{font-size:.78rem;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6;}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-icon"><svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
    Promptify
  </a>
  <h1>Create your account</h1>
  <p class="sub">Start creating for free — no credit card required</p>

  <form th:action="@{/signup}" th:object="${user}" method="post">
    <label for="name">Full Name</label>
    <input type="text" id="name" th:field="*{name}" placeholder="Your Name" required>
    <label for="email">Email Address</label>
    <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required>
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" th:field="*{phone}" placeholder="+91 XXXXX XXXXX" required>
    <label for="password">Password</label>
    <input type="password" id="password" th:field="*{password}" placeholder="Min 8 characters" required>
    <button type="submit" class="btn-submit">Create Account →</button>
  </form>

  <div class="terms">By signing up, you agree to our <a href="#" style="color:var(--accent)">Terms</a> and <a href="#" style="color:var(--accent)">Privacy Policy</a>.</div>
  <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
</div>
</body>
</html>
