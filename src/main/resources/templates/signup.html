<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .text-blue-accent { color: #3B82F6; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center">Sign Up</h1>
        <form th:action="@{/signup}" th:object="${user}" method="post" class="space-y-4">
            <div>
                <label class="block mb-1 font-medium">Name</label>
                <input type="text" th:field="*{name}" required class="w-full border px-3 py-2 rounded"/>
            </div>
            <div>
                <label class="block mb-1 font-medium">Email</label>
                <input type="email" th:field="*{email}" required class="w-full border px-3 py-2 rounded"/>
            </div>
            <div>
                <label class="block mb-1 font-medium">Phone</label>
                <input type="text" th:field="*{phone}" required class="w-full border px-3 py-2 rounded"/>
            </div>
            <div>
                <label class="block mb-1 font-medium">Password</label>
                <input type="password" th:field="*{password}" required class="w-full border px-3 py-2 rounded"/>
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Sign Up</button>
        </form>
        <p class="mt-4 text-center">Already have an account? <a href="/login" class="text-blue-accent">Login</a></p>
    </div>
</body>
</html>
