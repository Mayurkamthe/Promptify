<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
      color: #1A202C;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 0h2v20H2V0zm0 24h2V60H2V24zM6 0h2v20H6V0zm0 24h2V60H6V24zM10 0h2v20h-2V0zm0 24h2V60h-2V24zM14 0h2v20h-2V0zm0 24h2V60h-2V24zM18 0h2v20h-2V0zm0 24h2V60h-2V24zM22 0h2v20h-2V0zm0 24h2V60h-2V24zM26 0h2v20h-2V0zm0 24h2V60h-2V24zM30 0h2v20h-2V0zm0 24h2V60h-2V24zM34 0h2v20h-2V0zm0 24h2V60h-2V24zM38 0h2v20h-2V0zm0 24h2V60h-2V24zM42 0h2v20h-2V0zm0 24h2V60h-2V24zM46 0h2v20h-2V0zm0 24h2V60h-2V24zM50 0h2v20h-2V0zm0 24h2V60h-2V24zM54 0h2v20h-2V0zm0 24h2V60h-2V24zM58 0h2v20h-2V0zm0 24h2V60h-2V24z'%3E%3C/path%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      background-size: 60px 60px;
      opacity: 0.05;
      z-index: -1;
    }

    .text-blue-accent {
      color: #3B82F6; /* Tailwind's blue-500 */
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 md:p-10 rounded-lg shadow-xl w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
      <p class="text-gray-600">Please sign in to access your account.</p>
    </div>

    <!-- Thymeleaf form -->
    <form th:action="@{/perform_login}" method="post">
      <div class="mb-5">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="username" 
          th:value="${username}" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          placeholder="you@example.com" 
          required>
      </div>

      <div class="mb-5">
        <div class="flex justify-between items-center mb-2">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <a th:href="@{/forgot-password}" class="text-sm text-blue-accent hover:underline">Forgot password?</a>
        </div>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          placeholder="••••••••" 
          required>
      </div>

      <div class="mb-6">
        <button 
          type="submit"
          class="w-full bg-blue-500 text-white py-3 px-4 rounded-lg font-semibold shadow-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors duration-200">
          Sign In
        </button>
      </div>

      <p class="text-center text-sm text-gray-600">
        Don't have an account?
        <a href="/signup" class="font-medium text-blue-accent hover:underline">Sign up for free</a>
      </p>
    </form>
    
  </div>

</body>
</html>
